<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Water Rafting Company</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header class="main-header">
        <div class="logo-area">
            <!-- LOGO IMAGE SPOT -->
            <div class="Company logo">
                <img src="images/logo.png" alt="Company Logo">
            </div>
        </div>
        <nav class="nav-menu">
            <a href="#">Home</a>
            <a href="about.html">About Us</a>
            <a href="#">Trips</a>
            <a href="#">Contact Us</a>
        </nav>
    </header>

    <main class="main-content">
        <section class="company-details">
            <h1>White Water Rafting Company</h1>
            <address>
                2000 Devereux Rd,<br>
                Glenwood Springs,Colorado 81601<br>
                +1 999 999 9999<br>
                info@whitewater.com
            </address>
        </section>

        <section class="interaction-grid">
            <div class="map-container">
                <!-- REPLACED PLACEHOLDER WITH LIVE GOOGLE MAP -->
                <div class="map-box">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d49432260.23959602!2d-149.6249779!3d40.86955390000002!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c5b2053f4c26ab%3A0x59bebc6dc172141b!2sWhitewater%20Rafting%20Adventures!5e0!3m2!1sen!2sng!4v1775343114064!5m2!1sen!2sng"
                      width="600" height="450" style="border:0;" allowfullscreen="
                                     " loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>

            <form class="contact-form">
                <div class="input-row">
                    <label>Name</label>
                    <input type="text" placeholder="Placeholder">
                </div>
                <div class="input-row">
                    <label>Email</label>
                    <input type="email" placeholder="Placeholder">
                </div>

                <fieldset class="purpose-selection">
                    <legend>Message Purpose</legend>
                    <label><input type="radio" name="purpose" checked> General Inquiry</label>
                    <label><input type="radio" name="purpose"> Reservation Question</label>
                    <label><input type="radio" name="purpose"> Website Suggestion</label>
                </fieldset>


                <div class="input-row message-area">
                    <label>Message</label>
                    <textarea placeholder="Type here"></textarea>
                </div>

                <div class="newsletter-opt-in">
                    <input type="checkbox" id="news-check" checked>
                    <label for="news-check">Please Subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit" class="btn-submit">Get in Touch!</button>
            </form>
        </section>

        <hr class="section-divider">

        <section class="staff-showcase">
            <h2>We Are Here to Serve You</h2>
            <div class="profile-grid">
                <!-- EMPLOYEE 1 SPOT -->
                <div class="profile-item">
                    <div class="placeholder-img profile-pic">
                        <img src="images/profile 2.jpg" alt="Employee Profile">
                    </div>
                    <p>Supervisor</p>
                </div>
                <!-- EMPLOYEE 2 SPOT -->
                <div class="profile-item">
                    <div class="placeholder-img profile-pic">
                        <img src="images/manager profile.jpg" alt="Employee Profile">
                    </div>
                    <p>Manager</p>
                </div>
                <!-- EMPLOYEE 3 SPOT -->
                <div class="profile-item">
                    <div class="placeholder-img profile-pic">
                        <img src="images/profile 1.jpg" alt="Employee Profile">
                    </div>
                    <p>Receptionist</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <span class="F1">
            <p>&copy; 2026 White Water Rafting Company</p>
        </span>
        <div class="social-links">
            <a href="https://facebook.com" target="_blank" class="social-box">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://twitter.com" target="_blank" class="social-box">
                <img src="images/twitter.png" alt="X (Twitter)">
            </a>
            <a href="https://instagram.com" target="_blank" class="social-box">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </div>
    </footer>


</body>

</html>
